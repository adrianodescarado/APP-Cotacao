<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandrake - Sistema de Automação de Conversas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(10, 14, 39, 0.8);
            border-bottom: 2px solid #00d9ff;
            padding: 20px 0;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        header h1 {
            color: #00d9ff;
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            color: #b700ff;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid #00d9ff;
            color: #00d9ff;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(0, 217, 255, 0.2);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #00d9ff;
            color: #0a0e27;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* EDITOR SECTION */
        .editor-container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 20px;
            min-height: 600px;
        }

        .sidebar {
            background: rgba(26, 31, 58, 0.8);
            border: 2px solid #b700ff;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #b700ff;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .node-template {
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid #00d9ff;
            padding: 12px;
            margin-bottom: 10px;
            cursor: grab;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: bold;
            color: #00d9ff;
        }

        .node-template:hover {
            background: rgba(0, 217, 255, 0.2);
            transform: scale(1.05);
        }

        .node-template:active {
            cursor: grabbing;
        }

        .canvas {
            background: rgba(10, 14, 39, 0.6);
            border: 2px solid #00d9ff;
            border-radius: 8px;
            padding: 20px;
            position: relative;
            overflow: auto;
            min-height: 600px;
        }

        .canvas-grid {
            background-image:
                linear-gradient(rgba(0, 217, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100%;
            position: relative;
        }

        .node {
            position: absolute;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(183, 0, 255, 0.2));
            border: 2px solid #00d9ff;
            border-radius: 8px;
            padding: 15px;
            min-width: 200px;
            cursor: move;
            user-select: none;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            transition: all 0.2s ease;
        }

        .node:hover {
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.6);
            border-color: #b700ff;
        }

        .node.selected {
            border-color: #b700ff;
            box-shadow: 0 0 40px rgba(183, 0, 255, 0.8);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00d9ff;
        }

        .node-type {
            color: #b700ff;
            font-weight: bold;
            font-size: 12px;
        }

        .node-delete {
            background: #ff3333;
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .node-delete:hover {
            background: #ff5555;
            transform: scale(1.1);
        }

        .node-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .node-input {
            width: 100%;
            padding: 8px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }

        .node-input::placeholder {
            color: rgba(0, 217, 255, 0.5);
        }

        .node-input:focus {
            outline: none;
            border-color: #b700ff;
            box-shadow: 0 0 10px rgba(183, 0, 255, 0.5);
        }

        .node-handles {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #00d9ff;
        }

        .handle {
            width: 12px;
            height: 12px;
            background: #00d9ff;
            border-radius: 50%;
            cursor: crosshair;
            transition: all 0.2s ease;
        }

        .handle:hover {
            background: #b700ff;
            transform: scale(1.5);
        }

        .properties-panel {
            background: rgba(26, 31, 58, 0.8);
            border: 2px solid #b700ff;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
        }

        .properties-panel h3 {
            color: #b700ff;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .property-group {
            margin-bottom: 15px;
        }

        .property-label {
            color: #00d9ff;
            font-size: 12px;
            margin-bottom: 5px;
            display: block;
        }

        .property-input {
            width: 100%;
            padding: 8px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            border-radius: 4px;
            font-size: 13px;
        }

        .property-input:focus {
            outline: none;
            border-color: #b700ff;
            box-shadow: 0 0 10px rgba(183, 0, 255, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 100px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #b700ff);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid #00d9ff;
            color: #00d9ff;
        }

        .btn-secondary:hover {
            background: rgba(0, 217, 255, 0.2);
        }

        .btn-danger {
            background: #ff3333;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5555;
        }

        /* VIEWER SECTION */
        .viewer-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .chat-window {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-header {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ece5dd;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }

        .message.user .message-bubble {
            background: #dcf8c6;
            color: #333;
        }

        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #25d366;
        }

        .chat-send {
            background: #25d366;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .chat-send:hover {
            background: #20ba5a;
            transform: scale(1.1);
        }

        .theme-selector {
            background: rgba(26, 31, 58, 0.8);
            border: 2px solid #b700ff;
            border-radius: 8px;
            padding: 20px;
        }

        .theme-selector h3 {
            color: #b700ff;
            margin-bottom: 15px;
        }

        .theme-option {
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid #00d9ff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: bold;
        }

        .theme-option:hover {
            background: rgba(0, 217, 255, 0.2);
        }

        .theme-option.active {
            background: #00d9ff;
            color: #0a0e27;
        }

        .stats {
            background: rgba(26, 31, 58, 0.8);
            border: 2px solid #b700ff;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .stats h3 {
            color: #b700ff;
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
